<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор стоимости мебели</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .form-container {
            width: 300px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background: #f9f9f9;
        }
        input, select, textarea {
            width: 100%;
            margin-bottom: 10px;
            padding: 5px;
        }
        button {
            width: 100%;
            background: blue;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
        }
        .price {
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Калькулятор стоимости мебели</h2>
        <form id="costCalculator">
            <label>Тип мебели:</label>
            <select name="furnitureType" id="furnitureType">
                <option></option>
                <option value="Шкаф">Шкаф</option>
                <option value="Кухня">Кухня</option>
                <option value="Стол">Стол</option>
                <option value="Тумба">Тумба</option>
            </select>
            
            <label>Размеры (ШxВxГ в см):</label>
            <input type="text" name="dimensions" id="dimensions" placeholder="Например, 120x200x60" required>
            
            <label>Материал:</label>
            <select name="material" id="material">
                <option value="Дерево">Дерево</option>
                <option value="ЛДСП">ЛДСП</option>
                <option value="МДФ">МДФ</option>
            </select>
            
            <label>Цвет:</label>
            <input type="color" name="color">
            
            <label>Стиль:</label>
            <input type="text" name="style" placeholder="Классический, модерн и т.д.">
            
            <label>Особенности:</label>
            <input type="checkbox" name="features" value="Подсветка" id="lighting"> Подсветка
            <input type="checkbox" name="features" value="Доводчики" id="softClose"> Доводчики
            <br>
            
            <label>Комментарии:</label>
            <textarea name="comments" placeholder="Дополнительные пожелания"></textarea>
            
            <label>Контактные данные:</label>
            <input type="text" name="contact" placeholder="Имя и телефон" required>
            
            <div class="price">Цена: от <span id="price">0</span> руб.</div>
            
            <button type="submit">Рассчитать стоимость</button>
        </form>
    </div>
    <script>
        function calculatePrice() {
            let basePrice = Math.floor(Math.random() * 5000) + 5000; // Базовая случайная цена от 5000 до 10000
            let materialMultiplier = { "Дерево": 1.5, "ЛДСП": 1.1, "МДФ": 1.3 };
            let furnitureMultiplier = { "Шкаф": 1.2, "Кухня": 1.8, "Стол": 1.1, "Тумба": 1.0 };
            
            let selectedMaterial = document.getElementById('material').value;
            let selectedFurniture = document.getElementById('furnitureType').value;
            
            let finalPrice = basePrice * materialMultiplier[selectedMaterial] * furnitureMultiplier[selectedFurniture];
            
            if (document.getElementById('lighting').checked) {
                finalPrice += 1000;
            }
            if (document.getElementById('softClose').checked) {
                finalPrice += 500;
            }
            
            document.getElementById('price').textContent = finalPrice.toFixed(2);
        }
        
        document.getElementById('costCalculator').addEventListener('change', calculatePrice);
        document.getElementById('costCalculator').addEventListener('submit', function(event) {
            event.preventDefault();
            alert('Расчет стоимости: ' + document.getElementById('price').textContent + ' руб.');
        });
    </script>
</body>
</html>
